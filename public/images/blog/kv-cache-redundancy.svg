<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="headerGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="16" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">Autoregressive Generation: The Redundancy Problem</text>

  <!-- LEFT SIDE: Without KV Cache -->
  <rect x="30" y="60" width="410" height="440" rx="12" fill="#1e1e36" stroke="#374151" stroke-width="1"/>
  <rect x="30" y="60" width="410" height="36" rx="12" fill="url(#headerGrad)"/>
  <rect x="30" y="84" width="410" height="12" fill="url(#headerGrad)"/>
  <text x="235" y="84" text-anchor="middle" fill="white" font-size="14" font-weight="600">Without KV Cache</text>

  <!-- Step 1 -->
  <text x="50" y="125" fill="#94a3b8" font-size="12" font-weight="600">Step 1: Generate token 4</text>
  <rect x="50" y="135" width="65" height="30" rx="6" fill="#ef4444" opacity="0.8"/>
  <text x="82" y="155" text-anchor="middle" fill="white" font-size="11">The</text>
  <rect x="120" y="135" width="65" height="30" rx="6" fill="#ef4444" opacity="0.8"/>
  <text x="152" y="155" text-anchor="middle" fill="white" font-size="11">cat</text>
  <rect x="190" y="135" width="65" height="30" rx="6" fill="#ef4444" opacity="0.8"/>
  <text x="222" y="155" text-anchor="middle" fill="white" font-size="11">sat</text>
  <text x="270" y="155" fill="#fbbf24" font-size="16" font-weight="700">→</text>
  <rect x="290" y="135" width="65" height="30" rx="6" fill="#fbbf24" opacity="0.9"/>
  <text x="322" y="155" text-anchor="middle" fill="#1a1a2e" font-size="11" font-weight="600">on</text>
  <text x="370" y="155" fill="#94a3b8" font-size="10">3 K,V computed</text>

  <!-- Step 2 -->
  <text x="50" y="195" fill="#94a3b8" font-size="12" font-weight="600">Step 2: Generate token 5</text>
  <rect x="50" y="205" width="65" height="30" rx="6" fill="#ef4444" opacity="0.8"/>
  <text x="82" y="225" text-anchor="middle" fill="white" font-size="11">The</text>
  <rect x="120" y="205" width="65" height="30" rx="6" fill="#ef4444" opacity="0.8"/>
  <text x="152" y="225" text-anchor="middle" fill="white" font-size="11">cat</text>
  <rect x="190" y="205" width="65" height="30" rx="6" fill="#ef4444" opacity="0.8"/>
  <text x="222" y="225" text-anchor="middle" fill="white" font-size="11">sat</text>
  <rect x="260" y="205" width="65" height="30" rx="6" fill="#ef4444" opacity="0.8"/>
  <text x="292" y="225" text-anchor="middle" fill="white" font-size="11">on</text>
  <text x="340" y="225" fill="#fbbf24" font-size="16" font-weight="700">→</text>
  <rect x="358" y="205" width="65" height="30" rx="6" fill="#fbbf24" opacity="0.9"/>
  <text x="390" y="225" text-anchor="middle" fill="#1a1a2e" font-size="11" font-weight="600">the</text>

  <!-- Step 3 -->
  <text x="50" y="265" fill="#94a3b8" font-size="12" font-weight="600">Step 3: Generate token 6</text>
  <rect x="50" y="275" width="55" height="30" rx="6" fill="#ef4444" opacity="0.8"/>
  <text x="77" y="295" text-anchor="middle" fill="white" font-size="10">The</text>
  <rect x="110" y="275" width="55" height="30" rx="6" fill="#ef4444" opacity="0.8"/>
  <text x="137" y="295" text-anchor="middle" fill="white" font-size="10">cat</text>
  <rect x="170" y="275" width="55" height="30" rx="6" fill="#ef4444" opacity="0.8"/>
  <text x="197" y="295" text-anchor="middle" fill="white" font-size="10">sat</text>
  <rect x="230" y="275" width="55" height="30" rx="6" fill="#ef4444" opacity="0.8"/>
  <text x="257" y="295" text-anchor="middle" fill="white" font-size="10">on</text>
  <rect x="290" y="275" width="55" height="30" rx="6" fill="#ef4444" opacity="0.8"/>
  <text x="317" y="295" text-anchor="middle" fill="white" font-size="10">the</text>
  <text x="358" y="295" fill="#fbbf24" font-size="16" font-weight="700">→</text>
  <rect x="373" y="275" width="55" height="30" rx="6" fill="#fbbf24" opacity="0.9"/>
  <text x="400" y="295" text-anchor="middle" fill="#1a1a2e" font-size="10" font-weight="600">mat</text>

  <!-- Redundancy callout -->
  <rect x="50" y="330" width="370" height="70" rx="8" fill="#7f1d1d" opacity="0.5" stroke="#ef4444" stroke-width="1" stroke-dasharray="4"/>
  <text x="235" y="355" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="600">Redundant computation grows with each step</text>
  <text x="235" y="375" text-anchor="middle" fill="#fca5a5" font-size="12">3 + 4 + 5 = 12 K,V pairs computed</text>
  <text x="235" y="393" text-anchor="middle" fill="#f87171" font-size="14" font-weight="700">Complexity: O(n²)</text>

  <!-- Cost bars -->
  <text x="70" y="430" fill="#94a3b8" font-size="11">Step 1</text>
  <rect x="120" y="418" width="90" height="16" rx="4" fill="#ef4444" opacity="0.7"/>
  <text x="70" y="452" fill="#94a3b8" font-size="11">Step 2</text>
  <rect x="120" y="440" width="120" height="16" rx="4" fill="#ef4444" opacity="0.7"/>
  <text x="70" y="474" fill="#94a3b8" font-size="11">Step 3</text>
  <rect x="120" y="462" width="150" height="16" rx="4" fill="#ef4444" opacity="0.7"/>
  <text x="300" y="455" fill="#fca5a5" font-size="11" font-weight="600">Cost grows quadratically</text>

  <!-- RIGHT SIDE: With KV Cache -->
  <rect x="460" y="60" width="410" height="440" rx="12" fill="#1e1e36" stroke="#374151" stroke-width="1"/>
  <rect x="460" y="60" width="410" height="36" rx="12" fill="url(#headerGrad2)"/>
  <rect x="460" y="84" width="410" height="12" fill="url(#headerGrad2)"/>
  <text x="665" y="84" text-anchor="middle" fill="white" font-size="14" font-weight="600">With KV Cache</text>

  <!-- Step 1 -->
  <text x="480" y="125" fill="#94a3b8" font-size="12" font-weight="600">Step 1: Generate token 4 (Prefill)</text>
  <rect x="480" y="135" width="65" height="30" rx="6" fill="#3b82f6" opacity="0.8"/>
  <text x="512" y="155" text-anchor="middle" fill="white" font-size="11">The</text>
  <rect x="550" y="135" width="65" height="30" rx="6" fill="#3b82f6" opacity="0.8"/>
  <text x="582" y="155" text-anchor="middle" fill="white" font-size="11">cat</text>
  <rect x="620" y="135" width="65" height="30" rx="6" fill="#3b82f6" opacity="0.8"/>
  <text x="652" y="155" text-anchor="middle" fill="white" font-size="11">sat</text>
  <text x="700" y="155" fill="#fbbf24" font-size="16" font-weight="700">→</text>
  <rect x="720" y="135" width="65" height="30" rx="6" fill="#fbbf24" opacity="0.9"/>
  <text x="752" y="155" text-anchor="middle" fill="#1a1a2e" font-size="11" font-weight="600">on</text>
  <text x="800" y="155" fill="#86efac" font-size="10">→ Cache</text>

  <!-- Step 2 -->
  <text x="480" y="195" fill="#94a3b8" font-size="12" font-weight="600">Step 2: Generate token 5 (Decode)</text>
  <rect x="480" y="205" width="65" height="30" rx="6" fill="#22c55e" opacity="0.3" stroke="#22c55e" stroke-width="1" stroke-dasharray="3"/>
  <text x="512" y="225" text-anchor="middle" fill="#86efac" font-size="11">The</text>
  <rect x="550" y="205" width="65" height="30" rx="6" fill="#22c55e" opacity="0.3" stroke="#22c55e" stroke-width="1" stroke-dasharray="3"/>
  <text x="582" y="225" text-anchor="middle" fill="#86efac" font-size="11">cat</text>
  <rect x="620" y="205" width="65" height="30" rx="6" fill="#22c55e" opacity="0.3" stroke="#22c55e" stroke-width="1" stroke-dasharray="3"/>
  <text x="652" y="225" text-anchor="middle" fill="#86efac" font-size="11">sat</text>
  <rect x="690" y="205" width="65" height="30" rx="6" fill="#22c55e" opacity="0.3" stroke="#22c55e" stroke-width="1" stroke-dasharray="3"/>
  <text x="722" y="225" text-anchor="middle" fill="#86efac" font-size="11">on</text>
  <text x="770" y="225" fill="#fbbf24" font-size="16" font-weight="700">→</text>
  <rect x="788" y="205" width="65" height="30" rx="6" fill="#fbbf24" opacity="0.9"/>
  <text x="820" y="225" text-anchor="middle" fill="#1a1a2e" font-size="11" font-weight="600">the</text>
  <text x="535" y="250" fill="#86efac" font-size="9">cached (not recomputed)</text>

  <!-- Step 3 -->
  <text x="480" y="270" fill="#94a3b8" font-size="12" font-weight="600">Step 3: Generate token 6 (Decode)</text>
  <rect x="480" y="280" width="50" height="30" rx="6" fill="#22c55e" opacity="0.3" stroke="#22c55e" stroke-width="1" stroke-dasharray="3"/>
  <text x="505" y="300" text-anchor="middle" fill="#86efac" font-size="9">The</text>
  <rect x="534" y="280" width="50" height="30" rx="6" fill="#22c55e" opacity="0.3" stroke="#22c55e" stroke-width="1" stroke-dasharray="3"/>
  <text x="559" y="300" text-anchor="middle" fill="#86efac" font-size="9">cat</text>
  <rect x="588" y="280" width="50" height="30" rx="6" fill="#22c55e" opacity="0.3" stroke="#22c55e" stroke-width="1" stroke-dasharray="3"/>
  <text x="613" y="300" text-anchor="middle" fill="#86efac" font-size="9">sat</text>
  <rect x="642" y="280" width="50" height="30" rx="6" fill="#22c55e" opacity="0.3" stroke="#22c55e" stroke-width="1" stroke-dasharray="3"/>
  <text x="667" y="300" text-anchor="middle" fill="#86efac" font-size="9">on</text>
  <rect x="696" y="280" width="50" height="30" rx="6" fill="#22c55e" opacity="0.3" stroke="#22c55e" stroke-width="1" stroke-dasharray="3"/>
  <text x="721" y="300" text-anchor="middle" fill="#86efac" font-size="9">the</text>
  <text x="758" y="300" fill="#fbbf24" font-size="16" font-weight="700">→</text>
  <rect x="775" y="280" width="50" height="30" rx="6" fill="#fbbf24" opacity="0.9"/>
  <text x="800" y="300" text-anchor="middle" fill="#1a1a2e" font-size="9" font-weight="600">mat</text>

  <!-- Efficiency callout -->
  <rect x="480" y="330" width="370" height="70" rx="8" fill="#14532d" opacity="0.5" stroke="#22c55e" stroke-width="1" stroke-dasharray="4"/>
  <text x="665" y="355" text-anchor="middle" fill="#86efac" font-size="13" font-weight="600">Only new token K,V computed each step</text>
  <text x="665" y="375" text-anchor="middle" fill="#86efac" font-size="12">3 + 1 + 1 = 5 K,V pairs computed</text>
  <text x="665" y="393" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="700">Complexity: O(n)</text>

  <!-- Cost bars -->
  <text x="500" y="430" fill="#94a3b8" font-size="11">Step 1</text>
  <rect x="550" y="418" width="90" height="16" rx="4" fill="#3b82f6" opacity="0.7"/>
  <text x="500" y="452" fill="#94a3b8" font-size="11">Step 2</text>
  <rect x="550" y="440" width="30" height="16" rx="4" fill="#22c55e" opacity="0.7"/>
  <text x="500" y="474" fill="#94a3b8" font-size="11">Step 3</text>
  <rect x="550" y="462" width="30" height="16" rx="4" fill="#22c55e" opacity="0.7"/>
  <text x="620" y="455" fill="#86efac" font-size="11" font-weight="600">Constant cost per step</text>
</svg>