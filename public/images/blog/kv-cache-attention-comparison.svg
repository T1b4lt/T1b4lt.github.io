  <text x="550" y="105" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">GQA</text>
  <text x="550" y="120" text-anchor="middle" fill="#94a3b8" font-size="10">Grouped-Query Attention</text>

  <!-- GQA: 8 Q heads, 2 groups with 2 KV -->
  <!-- Group 1 -->
  <rect x="467" y="137" width="82" height="130" rx="8" fill="#374151" opacity="0.3" stroke="#4b5563" stroke-dasharray="3"/>
  <text x="508" y="152" text-anchor="middle" fill="#6b7280" font-size="9">Group 1</text>
  <g transform="translate(475, 158)">
    <rect x="0" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="14" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q1</text>
    <rect x="35" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="49" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q2</text>
    <rect x="0" y="33" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="14" y="52" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q3</text>
    <rect x="35" y="33" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="49" y="52" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q4</text>
  </g>
  <rect x="483" y="230" width="50" height="25" rx="5" fill="url(#kvGrad)"/><text x="508" y="247" text-anchor="middle" fill="white" font-size="9" font-weight="600">KV 1</text>

  <!-- Group 2 -->
  <rect x="555" y="137" width="82" height="130" rx="8" fill="#374151" opacity="0.3" stroke="#4b5563" stroke-dasharray="3"/>
  <text x="596" y="152" text-anchor="middle" fill="#6b7280" font-size="9">Group 2</text>
  <g transform="translate(563, 158)">
    <rect x="0" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="14" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q5</text>
    <rect x="35" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="49" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q6</text>
    <rect x="0" y="33" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="14" y="52" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q7</text>
    <rect x="35" y="33" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="49" y="52" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q8</text>
  </g>
  <rect x="571" y="230" width="50" height="25" rx="5" fill="url(#kvGrad)"/><text x="596" y="247" text-anchor="middle" fill="white" font-size="9" font-weight="600">KV 2</text>

  <!-- GQA stats -->
  <rect x="465" y="310" width="160" height="55" rx="8" fill="#292948"/>
  <text x="545" y="330" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="600">2 KV pairs cached</text>
  <text x="545" y="348" text-anchor="middle" fill="#94a3b8" font-size="11">Memory: 25% of MHA</text>

  <rect x="465" y="375" width="160" height="55" rx="8" fill="#292948" stroke="#22c55e" stroke-width="1"/>
  <text x="545" y="395" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">Industry standard</text>
  <text x="545" y="413" text-anchor="middle" fill="#94a3b8" font-size="10">Llama 3, Mistral, Gemma</text>

  <!-- ========== MLA ========== -->
  <rect x="665" y="80" width="215" height="400" rx="12" fill="#1e1e36" stroke="#374151" stroke-width="1"/>
  <text x="772" y="105" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">MLA</text>
  <text x="772" y="120" text-anchor="middle" fill="#94a3b8" font-size="10">Multi-Head Latent Attention</text>

  <!-- MLA: 8 Q heads, single compressed latent -->
  <g transform="translate(690, 140)">
    <rect x="0" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="14" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q1</text>
    <rect x="40" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="54" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q2</text>
    <rect x="80" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="94" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q3</text>
    <rect x="120" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="134" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q4</text>
  </g>
  <g transform="translate(690, 175)">
    <rect x="0" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="14" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q5</text>
    <rect x="40" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="54" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q6</text>
    <rect x="80" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="94" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q7</text>
    <rect x="120" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="134" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q8</text>
  </g>

  <!-- Compression arrows -->
  <line x1="720" y1="210" x2="760" y2="230" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
  <line x1="760" y1="210" x2="760" y2="230" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
  <line x1="800" y1="210" x2="775" y2="230" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>

  <!-- Latent vector (small compressed) -->
  <rect x="735" y="230" width="55" height="28" rx="6" fill="url(#latentGrad)"/>
  <text x="762" y="249" text-anchor="middle" fill="white" font-size="9" font-weight="700">c_t</text>

  <!-- Decompression arrow -->
  <text x="762" y="275" text-anchor="middle" fill="#67e8f9" font-size="10">decompress on-demand</text>
  <line x1="762" y1="260" x2="730" y2="285" stroke="#06b6d4" stroke-width="1" stroke-dasharray="3" opacity="0.6"/>
  <line x1="762" y1="260" x2="795" y2="285" stroke="#06b6d4" stroke-width="1" stroke-dasharray="3" opacity="0.6"/>
  <rect x="705" y="285" width="50" height="18" rx="4" fill="url(#kvGrad)" opacity="0.5"/>
  <text x="730" y="298" text-anchor="middle" fill="white" font-size="8">K</text>
  <rect x="770" y="285" width="50" height="18" rx="4" fill="url(#kvGrad)" opacity="0.5"/>
  <text x="795" y="298" text-anchor="middle" fill="white" font-size="8">V</text>

  <!-- MLA stats -->
  <rect x="680" y="310" width="180" height="55" rx="8" fill="#292948"/>
  <text x="770" y="330" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="600">1 latent vector cached</text>
  <text x="770" y="348" text-anchor="middle" fill="#94a3b8" font-size="11">Memory: ~6.7% of MHA</text>

  <rect x="680" y="375" width="180" height="55" rx="8" fill="#292948" stroke="#06b6d4" stroke-width="1"/>
  <text x="770" y="395" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="600">State of the art</text>
  <text x="770" y="413" text-anchor="middle" fill="#94a3b8" font-size="10">DeepSeek V3, Kimi K2</text>

  <!-- Bottom comparison bar -->
  <text x="450" y="460" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">KV Cache Memory Footprint (relative to MHA)</text>
  <rect x="40" y="470" width="160" height="10" rx="3" fill="#ef4444" opacity="0.8"/>
  <rect x="255" y="470" width="20" height="10" rx="3" fill="#f59e0b" opacity="0.8"/>
  <rect x="470" y="470" width="40" height="10" rx="3" fill="#22c55e" opacity="0.8"/>
  <rect x="690" y="470" width="11" height="10" rx="3" fill="#06b6d4" opacity="0.8"/>
  <text x="120" y="495" text-anchor="middle" fill="#94a3b8" font-size="10">100%</text>
  <text x="335" y="495" text-anchor="middle" fill="#94a3b8" font-size="10">12.5%</text>
  <text x="550" y="495" text-anchor="middle" fill="#94a3b8" font-size="10">25%</text>
  <text x="772" y="495" text-anchor="middle" fill="#94a3b8" font-size="10">~6.7%</text>
</svg>