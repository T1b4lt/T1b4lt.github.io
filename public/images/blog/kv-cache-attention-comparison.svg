<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="qGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="kvGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="latentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" rx="16" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">Attention Mechanism Variants: KV Cache Memory Comparison</text>

  <!-- Legend -->
  <rect x="250" y="48" width="14" height="14" rx="3" fill="url(#qGrad)"/>
  <text x="270" y="60" fill="#c4b5fd" font-size="12">Query (Q) heads</text>
  <rect x="400" y="48" width="14" height="14" rx="3" fill="url(#kvGrad)"/>
  <text x="420" y="60" fill="#fcd34d" font-size="12">Key-Value (K,V) pairs</text>
  <rect x="570" y="48" width="14" height="14" rx="3" fill="url(#latentGrad)"/>
  <text x="590" y="60" fill="#67e8f9" font-size="12">Latent vector (compressed)</text>

  <!-- ========== MHA ========== -->
  <rect x="20" y="80" width="200" height="400" rx="12" fill="#1e1e36" stroke="#374151" stroke-width="1"/>
  <text x="120" y="105" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">MHA</text>
  <text x="120" y="120" text-anchor="middle" fill="#94a3b8" font-size="10">Multi-Head Attention</text>

  <!-- MHA: 8 Q heads, each with own KV -->
  <g transform="translate(40, 140)">
    <rect x="0" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="14" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q1</text>
    <rect x="0" y="33" width="28" height="28" rx="5" fill="url(#kvGrad)"/><text x="14" y="52" text-anchor="middle" fill="white" font-size="9" font-weight="600">KV1</text>

    <rect x="40" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="54" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q2</text>
    <rect x="40" y="33" width="28" height="28" rx="5" fill="url(#kvGrad)"/><text x="54" y="52" text-anchor="middle" fill="white" font-size="9" font-weight="600">KV2</text>

    <rect x="80" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="94" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q3</text>
    <rect x="80" y="33" width="28" height="28" rx="5" fill="url(#kvGrad)"/><text x="94" y="52" text-anchor="middle" fill="white" font-size="9" font-weight="600">KV3</text>

    <rect x="120" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="134" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q4</text>
    <rect x="120" y="33" width="28" height="28" rx="5" fill="url(#kvGrad)"/><text x="134" y="52" text-anchor="middle" fill="white" font-size="9" font-weight="600">KV4</text>
  </g>

  <g transform="translate(40, 215)">
    <rect x="0" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="14" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q5</text>
    <rect x="0" y="33" width="28" height="28" rx="5" fill="url(#kvGrad)"/><text x="14" y="52" text-anchor="middle" fill="white" font-size="9" font-weight="600">KV5</text>

    <rect x="40" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="54" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q6</text>
    <rect x="40" y="33" width="28" height="28" rx="5" fill="url(#kvGrad)"/><text x="54" y="52" text-anchor="middle" fill="white" font-size="9" font-weight="600">KV6</text>

    <rect x="80" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="94" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q7</text>
    <rect x="80" y="33" width="28" height="28" rx="5" fill="url(#kvGrad)"/><text x="94" y="52" text-anchor="middle" fill="white" font-size="9" font-weight="600">KV7</text>

    <rect x="120" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="134" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q8</text>
    <rect x="120" y="33" width="28" height="28" rx="5" fill="url(#kvGrad)"/><text x="134" y="52" text-anchor="middle" fill="white" font-size="9" font-weight="600">KV8</text>
  </g>

  <!-- MHA stats -->
  <rect x="35" y="310" width="160" height="55" rx="8" fill="#292948"/>
  <text x="115" y="330" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="600">8 KV pairs cached</text>
  <text x="115" y="348" text-anchor="middle" fill="#94a3b8" font-size="11">Memory: 100% (baseline)</text>

  <rect x="35" y="375" width="160" height="55" rx="8" fill="#292948" stroke="#6366f1" stroke-width="1"/>
  <text x="115" y="395" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="600">Best quality</text>
  <text x="115" y="413" text-anchor="middle" fill="#94a3b8" font-size="10">Highest memory cost</text>

  <!-- ========== MQA ========== -->
  <rect x="235" y="80" width="200" height="400" rx="12" fill="#1e1e36" stroke="#374151" stroke-width="1"/>
  <text x="335" y="105" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">MQA</text>
  <text x="335" y="120" text-anchor="middle" fill="#94a3b8" font-size="10">Multi-Query Attention</text>

  <!-- MQA: 8 Q heads, 1 shared KV -->
  <g transform="translate(255, 140)">
    <rect x="0" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="14" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q1</text>
    <rect x="40" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="54" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q2</text>
    <rect x="80" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="94" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q3</text>
    <rect x="120" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="134" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q4</text>
  </g>
  <g transform="translate(255, 175)">
    <rect x="0" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="14" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q5</text>
    <rect x="40" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="54" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q6</text>
    <rect x="80" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="94" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q7</text>
    <rect x="120" y="0" width="28" height="28" rx="5" fill="url(#qGrad)"/><text x="134" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">Q8</text>
  </g>

  <!-- Arrows to single KV -->
  <line x1="269" y1="210" x2="320" y2="235" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
  <line x1="309" y1="210" x2="320" y2="235" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
  <line x1="349" y1="210" x2="340" y2="235" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
  <line x1="389" y1="210" x2="340" y2="235" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>

  <!-- Single shared KV -->
  <rect x="295" y="235" width="80" height="35" rx="6" fill="url(#kvGrad)"/>
  <text x="335" y="257" text-anchor="middle" fill="white" font-size="12" font-weight="600">KV (shared)</text>

  <!-- MQA stats -->
  <rect x="250" y="310" width="160" height="55" rx="8" fill="#292948"/>
  <text x="330" y="330" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="600">1 KV pair cached</text>
  <text x="330" y="348" text-anchor="middle" fill="#94a3b8" font-size="11">Memory: 12.5% of MHA</text>

  <rect x="250" y="375" width="160" height="55" rx="8" fill="#292948" stroke="#ef4444" stroke-width="1"/>
  <text x="330" y="395" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">Quality degradation</text>
  <text x="330" y="413" text-anchor="middle" fill="#94a3b8" font-size="10">Mostly superseded</text>

  <!-- ========== GQA ========== -->
