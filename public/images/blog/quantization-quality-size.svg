<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="900" height="440" rx="16" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">Quality vs size: the quantization trade-off</text>
  <text x="450" y="55" text-anchor="middle" fill="#94a3b8" font-size="12">llama.cpp quants of Llama-3.1-8B-Instruct &#183; average benchmark score vs file size (data: arXiv 2601.14277)</text>

  <!-- Gridlines + y labels (score 65..71) -->
  <g stroke="#2a2a4a" stroke-width="1">
    <line x1="100" y1="305.7" x2="840" y2="305.7"/>
    <line x1="100" y1="271.4" x2="840" y2="271.4"/>
    <line x1="100" y1="237.1" x2="840" y2="237.1"/>
    <line x1="100" y1="202.9" x2="840" y2="202.9"/>
    <line x1="100" y1="168.6" x2="840" y2="168.6"/>
    <line x1="100" y1="134.3" x2="840" y2="134.3"/>
  </g>
  <g fill="#64748b" font-size="11" text-anchor="end">
    <text x="92" y="309.7">65</text>
    <text x="92" y="275.4">66</text>
    <text x="92" y="241.1">67</text>
    <text x="92" y="206.9">68</text>
    <text x="92" y="172.6">69</text>
    <text x="92" y="138.3">70</text>
  </g>
  <text x="30" y="220" fill="#94a3b8" font-size="11" transform="rotate(-90 30 220)" text-anchor="middle">avg. benchmark score</text>

  <!-- X axis -->
  <line x1="100" y1="340" x2="840" y2="340" stroke="#475569" stroke-width="1.5"/>
  <g fill="#64748b" font-size="11" text-anchor="middle">
    <text x="159.2" y="360">4</text>
    <text x="277.6" y="360">6</text>
    <text x="396" y="360">8</text>
    <text x="514.4" y="360">10</text>
    <text x="632.8" y="360">12</text>
    <text x="751.2" y="360">14</text>
  </g>
  <text x="470" y="385" text-anchor="middle" fill="#94a3b8" font-size="11">file size (GiB)</text>

  <!-- Full-precision baseline -->
  <line x1="100" y1="152.4" x2="840" y2="152.4" stroke="#64748b" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="560" y="145" fill="#94a3b8" font-size="11">full-precision baseline (F16 = 69.5)</text>

  <!-- Trade-off curve -->
  <polyline fill="none" stroke="#6366f1" stroke-width="2" opacity="0.8"
    points="124.3,288.9 143.8,200.5 193.5,163.4 237.9,156.2 285.9,160.7 393,154.5 808,152.4"/>

  <!-- Points -->
  <g fill="#6366f1" stroke="#1a1a2e" stroke-width="2">
    <circle cx="808" cy="152.4" r="6"/>
    <circle cx="393" cy="154.5" r="6"/>
    <circle cx="285.9" cy="160.7" r="6"/>
    <circle cx="237.9" cy="156.2" r="6"/>
    <circle cx="193.5" cy="163.4" r="6"/>
    <circle cx="143.8" cy="200.5" r="6"/>
    <circle cx="124.3" cy="288.9" r="6"/>
  </g>

  <!-- Sweet spot highlight -->
  <circle cx="193.5" cy="163.4" r="12" fill="none" stroke="#d97706" stroke-width="2"/>

  <!-- Point labels -->
  <g fill="#e2e8f0" font-size="12" font-weight="600">
    <text x="808" y="178" text-anchor="middle">F16</text>
    <text x="393" y="180" text-anchor="middle">Q8_0</text>
    <text x="299" y="141" text-anchor="middle">Q6_K</text>
    <text x="237" y="136" text-anchor="middle">Q5_K_M</text>
    <text x="212" y="192">Q4_K_M</text>
    <text x="156" y="226">Q3_K_M</text>
    <text x="139" y="293">Q3_K_S</text>
  </g>

  <!-- Annotations -->
  <text x="215" y="110" fill="#fbbf24" font-size="12" font-weight="600">Q4_K_M: 3.3&#215; smaller, only &#8722;0.3 points</text>
  <line x1="212" y1="118" x2="197" y2="148" stroke="#d97706" stroke-width="1.5"/>
  <text x="152" y="320" fill="#fca5a5" font-size="12">below ~3.5 bits/weight,</text>
  <text x="152" y="336" fill="#fca5a5" font-size="12">quality starts to collapse</text>

  <!-- Footnote -->
  <text x="450" y="420" text-anchor="middle" fill="#64748b" font-size="11">y-axis zoomed to 64.5&#8211;71 to make differences visible &#183; benchmarks: MMLU, GSM8K, HellaSwag, ARC and others</text>
</svg>
