<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="900" height="400" rx="16" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">Why NF4 bins follow the bell curve</text>
  <text x="450" y="55" text-anchor="middle" fill="#94a3b8" font-size="12">quantizing to 4 bits = mapping every weight to one of 16 levels &#8212; the question is where you draw the lines</text>

  <!-- Panel titles -->
  <text x="215" y="105" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">Linear INT4: 16 equal-width bins</text>
  <text x="645" y="105" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">NF4: 16 equal-probability bins</text>

  <!-- LEFT panel: equal-width bin edges -->
  <g stroke="#475569" stroke-width="1">
    <line x1="66.2" y1="300" x2="66.2" y2="145"/>
    <line x1="87.5" y1="300" x2="87.5" y2="145"/>
    <line x1="108.8" y1="300" x2="108.8" y2="145"/>
    <line x1="130.0" y1="300" x2="130.0" y2="145"/>
    <line x1="151.2" y1="300" x2="151.2" y2="145"/>
    <line x1="172.5" y1="300" x2="172.5" y2="145"/>
    <line x1="193.8" y1="300" x2="193.8" y2="145"/>
    <line x1="215.0" y1="300" x2="215.0" y2="145"/>
    <line x1="236.2" y1="300" x2="236.2" y2="145"/>
    <line x1="257.5" y1="300" x2="257.5" y2="145"/>
    <line x1="278.8" y1="300" x2="278.8" y2="145"/>
    <line x1="300.0" y1="300" x2="300.0" y2="145"/>
    <line x1="321.2" y1="300" x2="321.2" y2="145"/>
    <line x1="342.5" y1="300" x2="342.5" y2="145"/>
    <line x1="363.8" y1="300" x2="363.8" y2="145"/>
  </g>

  <!-- RIGHT panel: equal-probability bin edges (normal quantiles) -->
  <g stroke="#475569" stroke-width="1">
    <line x1="544.7" y1="300" x2="544.7" y2="145"/>
    <line x1="569.8" y1="300" x2="569.8" y2="145"/>
    <line x1="587.0" y1="300" x2="587.0" y2="145"/>
    <line x1="600.9" y1="300" x2="600.9" y2="145"/>
    <line x1="613.0" y1="300" x2="613.0" y2="145"/>
    <line x1="624.2" y1="300" x2="624.2" y2="145"/>
    <line x1="634.7" y1="300" x2="634.7" y2="145"/>
    <line x1="645.0" y1="300" x2="645.0" y2="145"/>
    <line x1="655.3" y1="300" x2="655.3" y2="145"/>
    <line x1="665.8" y1="300" x2="665.8" y2="145"/>
    <line x1="677.0" y1="300" x2="677.0" y2="145"/>
    <line x1="689.1" y1="300" x2="689.1" y2="145"/>
    <line x1="703.0" y1="300" x2="703.0" y2="145"/>
    <line x1="720.2" y1="300" x2="720.2" y2="145"/>
    <line x1="745.3" y1="300" x2="745.3" y2="145"/>
  </g>

  <!-- LEFT gaussian curve -->
  <polygon fill="#6366f1" opacity="0.18" points="45.0,300 45.0,294.9 53.5,292.9 62.0,290.3 70.5,287.0 79.0,282.8 87.5,277.6 96.0,271.4 104.5,264.0 113.0,255.6 121.5,246.0 130.0,235.6 138.5,224.3 147.0,212.7 155.5,200.9 164.0,189.3 172.5,178.6 181.0,169.0 189.5,161.0 198.0,155.0 206.5,151.3 215.0,150.0 223.5,151.3 232.0,155.0 240.5,161.0 249.0,169.0 257.5,178.6 266.0,189.3 274.5,200.9 283.0,212.7 291.5,224.3 300.0,235.6 308.5,246.0 317.0,255.6 325.5,264.0 334.0,271.4 342.5,277.6 351.0,282.8 359.5,287.0 368.0,290.3 376.5,292.9 385.0,294.9 385.0,300"/>
  <polyline fill="none" stroke="#6366f1" stroke-width="2" points="45.0,294.9 53.5,292.9 62.0,290.3 70.5,287.0 79.0,282.8 87.5,277.6 96.0,271.4 104.5,264.0 113.0,255.6 121.5,246.0 130.0,235.6 138.5,224.3 147.0,212.7 155.5,200.9 164.0,189.3 172.5,178.6 181.0,169.0 189.5,161.0 198.0,155.0 206.5,151.3 215.0,150.0 223.5,151.3 232.0,155.0 240.5,161.0 249.0,169.0 257.5,178.6 266.0,189.3 274.5,200.9 283.0,212.7 291.5,224.3 300.0,235.6 308.5,246.0 317.0,255.6 325.5,264.0 334.0,271.4 342.5,277.6 351.0,282.8 359.5,287.0 368.0,290.3 376.5,292.9 385.0,294.9"/>

  <!-- RIGHT gaussian curve -->
  <polygon fill="#6366f1" opacity="0.18" points="475.0,300 475.0,294.9 483.5,292.9 492.0,290.3 500.5,287.0 509.0,282.8 517.5,277.6 526.0,271.4 534.5,264.0 543.0,255.6 551.5,246.0 560.0,235.6 568.5,224.3 577.0,212.7 585.5,200.9 594.0,189.3 602.5,178.6 611.0,169.0 619.5,161.0 628.0,155.0 636.5,151.3 645.0,150.0 653.5,151.3 662.0,155.0 670.5,161.0 679.0,169.0 687.5,178.6 696.0,189.3 704.5,200.9 713.0,212.7 721.5,224.3 730.0,235.6 738.5,246.0 747.0,255.6 755.5,264.0 764.0,271.4 772.5,277.6 781.0,282.8 789.5,287.0 798.0,290.3 806.5,292.9 815.0,294.9 815.0,300"/>
  <polyline fill="none" stroke="#6366f1" stroke-width="2" points="475.0,294.9 483.5,292.9 492.0,290.3 500.5,287.0 509.0,282.8 517.5,277.6 526.0,271.4 534.5,264.0 543.0,255.6 551.5,246.0 560.0,235.6 568.5,224.3 577.0,212.7 585.5,200.9 594.0,189.3 602.5,178.6 611.0,169.0 619.5,161.0 628.0,155.0 636.5,151.3 645.0,150.0 653.5,151.3 662.0,155.0 670.5,161.0 679.0,169.0 687.5,178.6 696.0,189.3 704.5,200.9 713.0,212.7 721.5,224.3 730.0,235.6 738.5,246.0 747.0,255.6 755.5,264.0 764.0,271.4 772.5,277.6 781.0,282.8 789.5,287.0 798.0,290.3 806.5,292.9 815.0,294.9"/>

  <!-- Baselines -->
  <line x1="45" y1="300" x2="385" y2="300" stroke="#64748b" stroke-width="1.5"/>
  <line x1="475" y1="300" x2="815" y2="300" stroke="#64748b" stroke-width="1.5"/>

  <!-- X labels -->
  <text x="45" y="318" fill="#64748b" font-size="11">&#8722;1</text>
  <text x="215" y="318" text-anchor="middle" fill="#64748b" font-size="11">0</text>
  <text x="385" y="318" text-anchor="end" fill="#64748b" font-size="11">+1</text>
  <text x="475" y="318" fill="#64748b" font-size="11">&#8722;1</text>
  <text x="645" y="318" text-anchor="middle" fill="#64748b" font-size="11">0</text>
  <text x="815" y="318" text-anchor="end" fill="#64748b" font-size="11">+1</text>

  <!-- Annotations -->
  <text x="215" y="348" text-anchor="middle" fill="#fca5a5" font-size="12">most weights pile up in just a handful of central bins</text>
  <text x="215" y="365" text-anchor="middle" fill="#fca5a5" font-size="12">&#8594; big rounding errors where it hurts most</text>
  <text x="645" y="348" text-anchor="middle" fill="#94a3b8" font-size="12">each bin captures 6.25% of the weights</text>
  <text x="645" y="365" text-anchor="middle" fill="#94a3b8" font-size="12">&#8594; finer resolution exactly where weights concentrate</text>
</svg>
