<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="900" height="420" rx="16" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">Where the tokens go in a coding-agent session</text>
  <text x="450" y="55" text-anchor="middle" fill="#94a3b8" font-size="12">input floods the meter, output gouges the price (ballpark figures, varies by session)</text>

  <!-- Row 1: volume -->
  <text x="60" y="105" fill="#e2e8f0" font-size="13" font-weight="600">Token volume per session</text>
  <g>
    <rect x="60" y="118" width="737" height="36" rx="4" fill="#6366f1"/>
    <rect x="801" y="118" width="39" height="36" rx="4" fill="#059669"/>
    <text x="428" y="141" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">Input &#8212; ~95%</text>
    <text x="820" y="108" text-anchor="middle" fill="#34d399" font-size="11" font-weight="600">Output ~5%</text>
    <line x1="820" y1="111" x2="820" y2="116" stroke="#34d399" stroke-width="1"/>
  </g>
  <text x="60" y="175" fill="#94a3b8" font-size="11">system prompt + tool definitions &#183; conversation replayed on every turn &#183; file reads &#183; command output</text>

  <!-- Row 2: price -->
  <text x="60" y="235" fill="#e2e8f0" font-size="13" font-weight="600">Price per token (typical API pricing)</text>
  <g>
    <text x="150" y="268" text-anchor="end" fill="#e2e8f0" font-size="12" font-weight="600">Input</text>
    <rect x="165" y="250" width="120" height="26" rx="4" fill="#6366f1"/>
    <text x="293" y="268" fill="#e2e8f0" font-size="13" font-weight="700">1&#215;</text>
  </g>
  <g>
    <text x="150" y="304" text-anchor="end" fill="#e2e8f0" font-size="12" font-weight="600">Output</text>
    <rect x="165" y="286" width="600" height="26" rx="4" fill="#059669"/>
    <text x="773" y="304" fill="#e2e8f0" font-size="13" font-weight="700">5&#215;</text>
  </g>

  <!-- Footnote -->
  <text x="450" y="360" text-anchor="middle" fill="#94a3b8" font-size="12" font-style="italic">Two different targets: shrink the flood of input, or tame the price of output.</text>
  <text x="450" y="388" text-anchor="middle" fill="#64748b" font-size="11">Every token the model writes also becomes input on the next turn &#8212; verbose output charges you twice.</text>
</svg>
